# packages/contracts/foundry.toml
[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 10000
via_ir = true
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "../../apps/web/public/deployments" }]

[fuzz]
runs = 1000

[invariant]
runs = 256
depth = 64
fail_on_revert = true

[rpc_endpoints]
localhost = "http://127.0.0.1:8545"
arc_testnet = "https://rpc.testnet.arc.network"
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
mainnet = { key = "${ETHERSCAN_API_KEY}" }
